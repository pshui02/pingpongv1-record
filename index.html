<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>乒乓紀錄系統 - 球員管理版</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="乒乓紀錄">

    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFhNzNlOCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDUiIHI9IjM1IiBmaWxsPSIjZWE0MzM1Ii8+PHJlY3QgeD0iNDUiIHk9IjcwIiB3aWR0aD0iMTAiIGhlaWdodD0iMjUiIGZpbGw9IiM4YjQ1MTMiLz48Y2lyY2xlIGN4PSI2MCIgY3k9IjQwIiByPSI1IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==">
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFhNzNlOCIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iNDUiIHI9IjM1IiBmaWxsPSIjZWE0MzM1Ii8+PHJlY3QgeD0iNDUiIHk9IjcwIiB3aWR0aD0iMTAiIGhlaWdodD0iMjUiIGZpbGw9IiM4YjQ1MTMiLz48Y2lyY2xlIGN4PSI2MCIgY3k9IjQwIiByPSI1IiBmaWxsPSJ3aGl0ZSIvPjwvc3ZnPg==">

    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; padding: 15px; color: #333; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; font-size: 1.6rem; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* 標題圖示的樣式 */
        .header-icon { width: 35px; height: 35px; vertical-align: middle; }

        .section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .flex-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #1a73e8; color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-danger { background: #ea4335; }
        .btn-success { background: #34a853; }
        
        /* 球員標籤樣式 (可點擊) */
        .player-chip { background: #e8f0fe; padding: 8px 15px; border-radius: 20px; font-size: 0.9em; border: 1px solid #d2e3fc; display: inline-block; margin: 3px; cursor: pointer; transition: 0.3s; }
        .player-chip:hover { background: #d2e3fc; border-color: #1a73e8; }
        .player-chip b { color: #1a73e8; margin-left: 5px; }

        .matrix-wrapper { overflow-x: auto; margin: 15px 0; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        .has-value { background: #e6f4ea; color: #1e8e3e; font-weight: bold; }
        
        .history-box { max-height: 250px; overflow-y: auto; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; align-items: center; }
        .vs-tag { background: #666; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.75em; margin-left: 8px; }
        .btn-undo { background: #5f6368; padding: 5px 10px; font-size: 0.8em; margin-left: 10px; border-radius: 5px; }
        
        .edit-hint { font-size: 0.8em; color: #888; margin-bottom: 10px; display: block; background: #fffde7; padding: 5px 10px; border-radius: 5px; border: 1px solid #fff9c4; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <svg class="header-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <rect width="100" height="100" fill="#1a73e8" rx="20"/>
            <circle cx="50" cy="45" r="35" fill="#ea4335"/>
            <rect x="45" y="70" width="10" height="25" fill="#8b4513"/>
            <circle cx="60" cy="40" r="5" fill="white"/>
        </svg>
        乒乓全能紀錄系統
    </h1>

    <div class="section">
        <h3>1. 球員名單</h3>
        <small class="edit-hint">💡 溫馨提示：點擊下方藍色球員標籤，可以「修改名字」或「徹底刪除」該球員。</small>
        <div class="flex-row">
            <input type="text" id="playerName" placeholder="輸入新球員姓名">
            <button onclick="addPlayer()">加入</button>
            <button class="btn-danger" onclick="clearAllData()">全部清空</button>
        </div>
        <div id="playerList" style="margin-top: 15px;"></div>
    </div>

    <div class="section">
        <h3>2. 紀錄新對局</h3>
        <div class="flex-row">
            <select id="playerA"></select>
            <span style="font-weight: bold; color: #666;">VS</span>
            <select id="playerB"></select>
            <button class="btn-success" onclick="recordMatch()">紀錄對賽</button>
        </div>
    </div>

    <div class="section">
        <h3>3. 對陣矩陣統計</h3>
        <div class="matrix-wrapper">
            <table id="vsMatrix">
                <thead><tr id="matrixHead"></tr></thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section" style="border:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3>4. 對賽歷史流水帳</h3>
            <button class="btn-export" onclick="exportCSV()">匯出 CSV 檔案</button>
        </div>
        <div id="history" class="history-box">目前沒有紀錄</div>
    </div>
</div>

<script>
    let players = [];
    let playerTotals = {};
    let vsCounts = {};
    let historyLog = [];

    window.onload = function() {
        const saved = localStorage.getItem('pingpong_pro_data_v2');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players || [];
            playerTotals = data.playerTotals || {};
            vsCounts = data.vsCounts || {};
            historyLog = data.historyLog || [];
            updateUI();
        }
    };

    function addPlayer() {
        const nameInput = document.getElementById('playerName');
        const name = nameInput.value.trim();
        if (!name) return;
        if (players.length >= 10) return alert("最多支援 10 位球員");
        if (players.includes(name)) return alert("姓名重複了");

        players.push(name);
        playerTotals[name] = 0;
        nameInput.value = '';
        updateUI();
        saveToLocal();
    }

    function editPlayer(oldName) {
        const newName = prompt(`修改球員 "${oldName}" 的名字\n(若留空並確認，將進入刪除程序)：`, oldName);
        
        if (newName === null) return; // 按了取消

        // 刪除邏輯
        if (newName.trim() === "") {
            if (confirm(`⚠️ 確定要徹底刪除球員 "${oldName}" 嗎？\n這將會移除該球員的所有統計資料與對賽歷史。`)) {
                players = players.filter(p => p !== oldName);
                delete playerTotals[oldName];
                for (let key in vsCounts) {
                    if (key.includes(oldName)) delete vsCounts[key];
                }
                historyLog = historyLog.filter(h => h.pA !== oldName && h.pB !== oldName);
                updateUI();
                saveToLocal();
            }
            return;
        }

        // 修改邏輯
        const trimmedNewName = newName.trim();
        if (trimmedNewName === oldName) return;
        if (players.includes(trimmedNewName)) return alert("此名字已被使用");

        const idx = players.indexOf(oldName);
        players[idx] = trimmedNewName;
        playerTotals[trimmedNewName] = playerTotals[oldName];
        delete playerTotals[oldName];

        const newVsCounts = {};
        for (let key in vsCounts) {
            if (key.includes(oldName)) {
                const parts = key.split(" vs ");
                const newKey = parts.map(p => p === oldName ? trimmedNewName : p).sort().join(" vs ");
                newVsCounts[newKey] = vsCounts[key];
            } else {
                newVsCounts[key] = vsCounts[key];
            }
        }
        vsCounts = newVsCounts;

        historyLog.forEach(h => {
            if (h.pA === oldName) h.pA = trimmedNewName;
            if (h.pB === oldName) h.pB = trimmedNewName;
        });

        updateUI();
        saveToLocal();
    }

    function recordMatch() {
        const pA = document.getElementById('playerA').value;
        const pB = document.getElementById('playerB').value;
        if (!pA || !pB || pA === pB) return alert("請選擇兩位不同的球員");

        playerTotals[pA]++;
        playerTotals[pB]++;
        const pairKey = [pA, pB].sort().join(" vs ");
        vsCounts[pairKey] = (vsCounts[pairKey] || 0) + 1;
        const now = new Date();
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        historyLog.unshift({
            id: Date.now(),
            pA: pA, pB: pB,
            time: timeStr,
            currentVsCount: vsCounts[pairKey]
        });

        updateUI();
        saveToLocal();
    }

    function undoMatch(id) {
        if (!confirm("確定要刪除這筆紀錄嗎？相關數值會自動扣除。")) return;
        const index = historyLog.findIndex(h => h.id === id);
        if (index > -1) {
            const match = historyLog[index];
            playerTotals[match.pA] = Math.max(0, playerTotals[match.pA] - 1);
            playerTotals[match.pB] = Math.max(0, playerTotals[match.pB] - 1);
            const pairKey = [match.pA, match.pB].sort().join(" vs ");
            vsCounts[pairKey] = Math.max(0, (vsCounts[pairKey] || 0) - 1);
            historyLog.splice(index, 1);
            updateUI();
            saveToLocal();
        }
    }

    function updateUI() {
        const listDiv = document.getElementById('playerList');
        listDiv.innerHTML = players.map(p => `
            <span class="player-chip" onclick="editPlayer('${p}')">${p} <b>${playerTotals[p]}</b></span>
        `).join('');

        const selA = document.getElementById('playerA');
        const selB = document.getElementById('playerB');
        const options = players.map(p => `<option value="${p}">${p}</option>`).join('');
        selA.innerHTML = options;
        selB.innerHTML = options;

        const head = document.getElementById('matrixHead');
        const body = document.getElementById('matrixBody');
        head.innerHTML = '<th>球員</th>' + players.map(p => `<th>${p}</th>`).join('');
        body.innerHTML = '';
        players.forEach((pRow, i) => {
            let rowHtml = `<tr><td><b>${pRow}</b></td>`;
            players.forEach((pCol, j) => {
                if (i === j) rowHtml += `<td style="color:#ccc;">-</td>`;
                else {
                    const count = vsCounts[[pRow, pCol].sort().join(" vs ")] || 0;
                    rowHtml += `<td class="${count > 0 ? 'has-value' : ''}">${count}</td>`;
                }
            });
            body.innerHTML += rowHtml + '</tr>';
        });

        const historyDiv = document.getElementById('history');
        if (historyLog.length === 0) {
            historyDiv.innerHTML = "目前沒有紀錄";
        } else {
            historyDiv.innerHTML = historyLog.map(h => `
                <div class="history-item">
                    <div>
                        <b>${h.pA}</b> vs <b>${h.pB}</b>
                        <span class="vs-tag">累計第 ${h.currentVsCount} 次</span>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <span style="color: #999; font-size: 0.8em;">${h.time}</span>
                        <button class="btn-undo" onclick="undoMatch(${h.id})">撤銷</button>
                    </div>
                </div>
            `).join('');
        }
    }

    function saveToLocal() {
        // 使用不同的 LocalStorage Key 以避免與舊版本數據衝突
        localStorage.setItem('pingpong_pro_data_v2', JSON.stringify({ players, playerTotals, vsCounts, historyLog }));
    }

    function clearAllData() {
        if (confirm("這會刪除所有球員、計數與歷史紀錄，確定嗎？")) {
            localStorage.removeItem('pingpong_pro_data_v2');
            location.reload();
        }
    }

    function exportCSV() {
        let csv = "\uFEFF球員,總參賽次數\n";
        players.forEach(p => csv += `${p},${playerTotals[p]}\n`);
        csv += "\n對陣矩陣統計\n,";
        csv += players.join(",") + "\n";
        players.forEach(pRow => {
            csv += pRow + ",";
            csv += players.map(pCol => pRow === pCol ? "-" : (vsCounts[[pRow, pCol].sort().join(" vs ")] || 0)).join(",") + "\n";
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `乒乓球紀錄表_${new Date().toLocaleDateString()}.csv`;
        link.click();
    }
</script>

</body>
</html>
